services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/database:/app/database
      - ./backend/logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - PDF_PATH=/app/database/medical_book.pdf
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: always
